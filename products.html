<style>
:root {
  --bg:#000;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.06);

  --blue:#5e9eff;--accent:#5e9eff;--nav-bg:rgba(0,0,0,.7);
}
[data-theme="light"] {
  --bg:#fbfbfd;--surface:#fff;--border:#e5e5ea;
  --text:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;
  --blue:#0066cc;--accent:#0066cc;--nav-bg:rgba(251,251,253,.8);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.container{max-width:1100px;margin:0 auto;padding:0 32px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:var(--nav-bg);border-bottom:1px solid var(--border)}
nav .logo{font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
nav .logo a{color:var(--text);text-decoration:none}
nav .logo span{color:var(--accent)}
nav .links{display:flex;gap:24px;align-items:center}
nav .links a{color:var(--text-secondary);text-decoration:none;font-size:14px;transition:color .2s}
nav .links a:hover,.nav .links .active{color:var(--accent)}
.theme-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#f5f5f7}
[data-theme="light"] .theme-btn{background:#1d1d1f}
.theme-btn:hover{opacity:.8}
[data-theme="light"] .sun{display:none}
html:not([data-theme="light"]) .moon{display:none}
.hero{padding:120px 0 40px;text-align:center}
.hero h1{font-size:clamp(36px,5vw,56px);font-weight:700;letter-spacing:-.02em;margin-bottom:12px}
.hero p{font-size:18px;color:var(--text-secondary);margin-bottom:32px}
.search-bar{max-width:480px;margin:0 auto 48px;position:relative}
.search-bar input{width:100%;padding:16px 20px 16px 48px;border:1px solid var(--border);border-radius:14px;font-size:16px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-tertiary)}
.tabs{display:flex;gap:6px;justify-content:center;margin-bottom:48px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);transition:all .2s}
.tab:hover{color:var(--text);border-color:var(--border-hover,#d2d2d7)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.category{margin-bottom:48px}
.category h2{font-size:24px;font-weight:700;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;transition:all .25s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card .name{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--text)}
.card .company{font-size:13px;color:var(--text-tertiary);margin-bottom:12px}
.card .highlights{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.card .highlights span{font-size:12px;padding:4px 10px;border-radius:8px;background:rgba(94,158,255,.1);color:var(--accent)}
.card .price{font-size:12px;color:var(--text-tertiary)}
footer{text-align:center;padding:60px 20px;color:var(--text-tertiary);font-size:13px;border-top:1px solid var(--border);margin-top:40px}
@media(max-width:768px){.container{padding:0 20px}.grid{grid-template-columns:1fr}}

function render(cat,search){
  const content=document.getElementById('content');
  let html='';
  const cats=cat==='all'?Object.keys(PRODUCTS):[cat];
  cats.forEach(k=>{
    let prods=PRODUCTS[k];
    if(search){prods=prods.filter(p=>p.n.includes(search)||p.c.includes(search))}
    if(!prods.length)return;
    html+=`<div class="category"><h2>${catNames[k]} · ${prods.length}款</h2><div class="grid">`;
    prods.forEach(p=>{
      html+=`<div class="card"><div class="name">${p.n}</div><div class="company">${p.c}</div><div class="highlights">${p.h.map(h=>`<span>${h}</span>`).join('')}</div><div class="price">${p.p}</div></div>`;
    });
    html+=`</div></div>`;
  });
  content.innerHTML=html||'<p style="color:var(--text-tertiary);text-align:center;padding:60px">没有找到匹配的产品</p>';
}

document.getElementById('tabs').addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  render(e.target.dataset.cat,document.getElementById('searchInput').value.trim());
});

let searchTimer;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const active=document.querySelector('.tab.active');
    render(active?active.dataset.cat:'all',this.value.trim());
  },200);
});
