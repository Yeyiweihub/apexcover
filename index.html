<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApexCover</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #000;
  --surface: rgba(255,255,255,.04);
  --surface-hover: rgba(255,255,255,.08);
  --border: rgba(255,255,255,.06);
  --border-hover: rgba(255,255,255,.12);
  --text: #e8e8ed;
  --text-secondary: #98989e;
  --text-tertiary: #636369;
  --blue: #5e9eff;
  --accent: #5e9eff;
  --nav-bg: rgba(0,0,0,.7);
  --radius: 20px;
  --radius-lg: 28px;
  --transition: cubic-bezier(.25,.1,.25,1);
}
[data-theme="light"] {
  --bg: #fbfbfd;
  --surface: #fff;
  --surface-hover: #f5f5f7;
  --border: #e5e5ea;
  --border-hover: #d2d2d7;
  --text: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --blue: #0066cc;
  --accent: #0066cc;
  --nav-bg: rgba(251,251,253,.8);
}

html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Background */
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(41,151,255,.08) 0%, transparent 100%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(41,151,255,.04) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.container { max-width: 1100px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

/* Nav */
nav {
  position: fixed;
  top: 0;
  left: 0; right: 0;
  z-index: 100;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  background: var(--nav-bg);
  border-bottom: 1px solid var(--border);
}
nav .logo { font-size: 18px; font-weight: 600; letter-spacing: -.01em; color: var(--text); }
nav .logo span { color: var(--accent); }
.theme-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,.15);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f5f5f7;
  transition: all .25s;
}
[data-theme="light"] .theme-btn {
  background: #1d1d1f;
  color: #f5f5f7;
}
.theme-btn:hover { opacity: .8; }
[data-theme="light"] .sun { display: none; }
html:not([data-theme="light"]) .moon { display: none; }

/* Hero */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 24px 80px;
  position: relative;
}
.hero h1 {
  font-size: clamp(48px, 7vw, 80px);
  font-weight: 700;
  letter-spacing: -.025em;
  line-height: 1.05;
  margin-bottom: 20px;
  max-width: 700px;
}
.hero h1 .accent {
  background: linear-gradient(135deg, #2997ff 0%, #5e9eff 40%, #a0c4ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero p {
  font-size: 19px;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: -.01em;
  max-width: 480px;
  line-height: 1.6;
  margin-bottom: 48px;
}

/* Search */
.search-wrap {
  width: 100%;
  max-width: 480px;
  position: relative;
  margin-bottom: 56px;
}
.search-wrap input {
  width: 100%;
  padding: 18px 24px 18px 56px;
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 17px;
  font-family: inherit;
  background: var(--surface);
  color: var(--text);
  transition: all .3s var(--transition);
  outline: none;
}
[data-theme="dark"] .search-wrap input {
  background: rgba(255,255,255,.05);
  backdrop-filter: blur(10px);
}
[data-theme="light"] .search-wrap input {
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.search-wrap input::placeholder { color: var(--text-tertiary); }
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(0,113,227,.1);
  outline: none;
}
.search-wrap svg {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  pointer-events: none;
}
.search-results {
  position: absolute;
  top: calc(100% + 8px);
  left: 0; right: 0;
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  max-height: 360px;
  overflow-y: auto;
  box-shadow: 0 4px 24px rgba(0,0,0,.12);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  display: none;
  z-index: 200;
}
[data-theme="dark"] .search-results { background: rgba(30,30,32,.95); }
.search-results.show { display: block; }
.search-results .item {
  padding: 14px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background .2s;
}
.search-results .item:last-child { border: none; }
.search-results .item:hover { background: var(--surface-hover); }
.search-results .item .icon { font-size: 22px; flex-shrink: 0; opacity: .8; }
.search-results .item .title { font-weight: 500; font-size: 15px; color: var(--text); }
.search-results .item .meta { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }

/* Grid */
section { padding: 100px 0; }
.section-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: end;
  margin-bottom: 56px;
}
.section-label {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
section h2 {
  font-size: clamp(32px, 4vw, 40px);
  font-weight: 700;
  letter-spacing: -.02em;
  line-height: 1.15;
}
section .lead {
  font-size: 17px;
  font-weight: 400;
  color: var(--text-tertiary);
  line-height: 1.7;
  align-self: end;
  text-align: right;
  letter-spacing: -.005em;
}
@media (max-width: 768px) {
  .section-header { grid-template-columns: 1fr; gap: 16px; }
  section .lead { text-align: left; }
}

/* Cards */
.cards {
  display: grid;
  gap: 20px;
  align-items: stretch;
}
.cards-2 { grid-template-columns: 1fr 1fr; }
.cards-3 { grid-template-columns: repeat(3, 1fr); }
.cards-4 { grid-template-columns: repeat(4, 1fr); }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px;
  transition: all .4s var(--transition);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100%;
}
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(600px circle at var(--mx, 50%) var(--my, 50%), rgba(41,151,255,.08) 0%, transparent 60%);
  opacity: 0;
  transition: opacity .3s;
}
.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}
.card:hover::after { opacity: 1; }
.card .emoji { font-size: 36px; margin-bottom: 24px; display: block; }
.card h3 { font-size: 20px; font-weight: 600; letter-spacing: -.01em; margin-bottom: 8px; }
.card p { font-size: 14px; color: var(--text-tertiary); line-height: 1.55; letter-spacing: -.005em; }
.card .tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: auto;
  padding-top: 20px;
  font-size: 14px;
  color: var(--accent);
  font-weight: 500;
  transition: gap .25s;
}
.card:hover .tag { gap: 10px; }
.card .tag::after {
  content: '→';
  transition: transform .25s;
}
.card:hover .tag::after { transform: translateX(2px); }

/* Featured card (large, consumer vs pro) */
.featured-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.featured {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 56px 48px;
  transition: all .4s var(--transition);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.featured::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(500px circle at var(--mx, 50%) var(--my, 50%), rgba(41,151,255,.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.featured:hover { border-color: var(--border-hover); }
.featured:hover::after { opacity: 1; }
.panel-icon {
  margin-bottom: 20px;
  color: var(--accent);
  opacity: .7;
}

.featured .tag {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
}
.featured h3 { font-size: 28px; font-weight: 700; letter-spacing: -.015em; margin-bottom: 12px; }
.featured .desc { font-size: 16px; color: var(--text-tertiary); line-height: 1.65; margin-bottom: 28px; letter-spacing: -.005em; }
.featured .links { display: flex; flex-direction: column; gap: 2px; }
.featured .links a,.featured .links div {
  font-size: 15px; color: var(--text-secondary);
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  transition: all .25s;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
}
.featured .links a:last-child,.featured .links div:last-child { border-bottom: none; }
.featured .links a::after,.featured .links div::after {
  content: '';
  width: 6px; height: 6px;
  border-right: 1.5px solid currentColor;
  border-top: 1.5px solid currentColor;
  transform: rotate(45deg);
  opacity: 0;
  transition: all .25s;
}
.featured .links a:hover,.featured .links div:hover { color: var(--accent); padding-left: 4px; }
.featured .links a:hover::after,.featured .links div:hover::after { opacity: 1; }

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 48px 32px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 13px;
  line-height: 1.8;
}

/* Scroll reveal */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);
}
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: .1s; }
.reveal-delay-2 { transition-delay: .2s; }
.reveal-delay-3 { transition-delay: .3s; }

@media (max-width: 768px) {
  .featured-grid, .cards-2, .cards-3, .cards-4 { grid-template-columns: 1fr; }
  .hero h1 { font-size: 40px; }
  .container { padding: 0 20px; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<nav>
  <div class="logo">Apex<span>Cover</span></div>
  <button id="themeToggle" class="theme-btn" aria-label="切换主题">
    <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</nav>

<section class="hero">
  <div class="container" style="display:flex;flex-direction:column;align-items:center;">
    <h1 class="reveal">保障，可以<br>更<span class="accent">清晰</span>一点</h1>
    <p class="reveal reveal-delay-1">无论是为自己寻找一份安心的保单，还是成为更值得信赖的保险人</p>
    <div class="search-wrap reveal reveal-delay-2">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="搜产品、公司、课程..." autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
  </div>
</section>

<!-- Consumer & Pro -->
<section>
  <div class="container">
    <div class="featured-grid">
      <div class="featured reveal">
        <div class="tag">消费者</div>
        <div class="panel-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <h3>我想买保险</h3>
        <p class="desc">为自己和家人，找到合适的保障方案。</p>
        <div class="links">
          <a href="advisor.html" style="text-decoration:none;color:inherit;display:block;position:relative;z-index:1">智能规划</a>
          <a href="learn.html" style="text-decoration:none;color:inherit;display:block;position:relative;z-index:1">保险科普</a>
          <a href="products.html" style="text-decoration:none;color:inherit;display:block;position:relative;z-index:1">产品目录</a>
        </div>
      </div>
      <div class="featured reveal reveal-delay-1">
        <div class="tag">从业者</div>
        <div class="panel-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h3>我是保险从业者</h3>
        <p class="desc">提升专业能力，更精准地服务每一位客户。</p>
        <div class="links">
          <div>产品拆解</div>
          <div>法商课堂</div>
          <div>金税四期</div>
          <div>销售实战</div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="reveal">
  ApexCover · 让保险回归透明
</footer>

<script>
// Theme toggle
(function(){
  const btn = document.getElementById('themeToggle');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(!prefersDark){document.documentElement.setAttribute('data-theme','light');localStorage.setItem('apexcover-theme','light');}
  btn.addEventListener('click',()=>{
    const cur = document.documentElement.getAttribute('data-theme');
    const next=cur==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',next);localStorage.setItem('apexcover-theme',next);
  });
})();

// Scroll reveal
(function(){
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting){ e.target.classList.add('visible'); }
      else { e.target.classList.remove('visible'); }
    });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
})();

// Magnetic hover effect on cards
document.querySelectorAll('[data-magnetic]').forEach(card => {
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    card.style.setProperty('--mx', `${e.clientX - r.left}px`);
    card.style.setProperty('--my', `${e.clientY - r.top}px`);
  });
});

// Search
const INDEX = [
  { t:"达尔文12号", m:"重疾险 · 复星联合健康", icon:"🏥" },
  { t:"完美人生8号", m:"重疾险 · 复星联合健康", icon:"🏥" },
  { t:"超级玛丽16号Pro", m:"重疾险 · 君龙人寿", icon:"🏥" },
  { t:"大黄蜂17号全能版", m:"少儿重疾险 · 北京人寿", icon:"🏥" },
  { t:"好医保·长期医疗", m:"百万医疗险 · 人保健康", icon:"💊" },
  { t:"蓝医保·好医好药Pro", m:"百万医疗险 · 太平洋健康", icon:"💊" },
  { t:"人保大护甲8号", m:"意外险 · 中国人保", icon:"🤕" },
  { t:"擎天柱12号", m:"定期寿险 · 和泰人寿", icon:"🛡️" },
  { t:"岁享金生", m:"增额终身寿 · 昆仑健康", icon:"📈" },
  { t:"星福家朱雀版", m:"分红型增额寿 · 复星保德信", icon:"📈" },
  { t:"平安车险", m:"车险 · 平安产险", icon:"🚗" },
  { t:"复星联合健康", m:"保险公司", icon:"🏢" },
  { t:"君龙人寿", m:"保险公司", icon:"🏢" },
  { t:"中国人保", m:"保险公司", icon:"🏢" },
  { t:"重疾险怎么选", m:"保险科普", icon:"📚" },
  { t:"医疗险避坑指南", m:"保险科普", icon:"📚" },
  { t:"金税四期与保险", m:"从业者课程", icon:"🎓" },
  { t:"法商课堂", m:"从业者课程", icon:"🎓" },
  { t:"智能规划", m:"25题问答匹配方案", icon:"🎯" },
  { t:"保险科普", m:"视频课程", icon:"📚" },
];

const input = document.getElementById('searchInput');
const results = document.getElementById('searchResults');
input.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { results.classList.remove('show'); return; }
  const hits = INDEX.filter(i => i.t.toLowerCase().includes(q) || i.m.toLowerCase().includes(q)).slice(0, 6);
  results.innerHTML = hits.length
    ? hits.map(h => `<div class="item"><span class="icon">${h.icon}</span><div><div class="title">${h.t}</div><div class="meta">${h.m}</div></div></div>`).join('')
    : '<div class="item" style="color:#6e6e73">未找到相关内容</div>';
  results.classList.add('show');
});
document.addEventListener('click', e => { if(!e.target.closest('.search-wrap')) results.classList.remove('show'); });

</script>
</body>
</html>
