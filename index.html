// Branch resolution function (adults only)
function resolveBranch(trunkAnswers){
  const age=trunkAnswers["t1"]; const role=trunkAnswers["t3"];
  const income=trunkAnswers["t4"]; const occupation=trunkAnswers["t5"];
  // C: business owner / high income
  if(occupation==="business-owner"||["100-500","gt500"].includes(income))return {branch:"C",label:"企业主/高净值"};
  // D: age 46+ → Senior (unless biz owner)
  if(["46-55","56-65","66+"].includes(age)&&occupation!=="business-owner")return {branch:"D",label:"银发安康"};
  // B: family (has kids / married)
  if(["parent-young","parent-school"].includes(role)||["couple"].includes(role))return {branch:"B",label:"家庭守护者"};
  // A: default → young strivers
  return {branch:"A",label:"年轻奋斗族"};
}

/* ==================== SCORING ENGINE ==================== */
function calculateRecommendations(answers) {
  const scores={};
  function g(id){return answers[id]}
  function ga(id){const v=answers[id];return Array.isArray(v)?v:(v?[v]:[])}
  function h(arr,val){return arr.includes(val)}
  // Multi-ID lookup: tries each possible branch-specific ID, returns first non-undefined
  function gm(ids){for(const id of ids){const v=answers[id];if(v!==undefined)return v;}return undefined;}
  function gma(ids){const v=gm(ids);return Array.isArray(v)?v:(v?[v]:[]);}
  function add(cat,name,pts,reason){
    if(!scores[cat])scores[cat]={};
    if(!scores[cat][name])scores[cat][name]={score:0,reasons:[]};
    scores[cat][name].score+=pts;
    scores[cat][name].reasons.push(reason);
  }

  // Trunk answers (IDs: t1-t5)
  const age=g("t1"),gender=g("t2"),role=g("t3"),income=g("t4"),occupation=g("t5");
  // Branch answers — use gm() to find across branches
  const socialS=new Set(gma(["a1","b1","c1","d1"]));
  const healthS=new Set(gma(["a2","b2","c3","d2"]));
  const existingS=new Set(gma(["a3","b3","c4","d3"]));
  const priority=gm(["a4","b4","c5","d4"])||"all-around";

    if(scores["accident"]){for(const k of Object.keys(scores["accident"])){if(k.includes("平安")||k.includes("人保"))scores["accident"][k].score+=4;}}
    if(scores["auto"]){for(const k of Object.keys(scores["auto"])){if(k.includes("平安"))scores["auto"][k].score+=5;scores["auto"][k].reasons.unshift("您最看重理赔速度，平安AI闪赔3分钟到账行业领先");}}
  }
  if(valuesS.has("price")){
    if(scores["termLife"]){for(const k of Object.keys(scores["termLife"])){if(k.includes("擎天柱"))scores["termLife"][k].score+=5;}}
    if(scores["accident"]){for(const k of Object.keys(scores["accident"])){if(k.includes("小蜜蜂")||k.includes("小神童"))scores["accident"][k].score+=4;}}
    if(scores["medical"]){for(const k of Object.keys(scores["medical"])){if(k.includes("京东保")||k.includes("星相守"))scores["medical"][k].score+=4;}}
  }
  if(valuesS.has("brand-trust")){
    if(scores["criticalIllness"])for(const k of Object.keys(scores["criticalIllness"])){if(k.includes("阿基米德")||k.includes("青云卫"))scores["criticalIllness"][k].score+=5;}
    if(scores["medical"])for(const k of Object.keys(scores["medical"])){if(k.includes("好医保")||k.includes("e生保")||k.includes("微医保"))scores["medical"][k].score+=4;}
    if(scores["savings"])for(const k of Object.keys(scores["savings"])){if(k.includes("平安")||k.includes("国寿")||k.includes("太平洋")||k.includes("新华"))scores["savings"][k].score+=4;}
  }
  if(valuesS.has("coverage")){
    if(scores["criticalIllness"])for(const k of Object.keys(scores["criticalIllness"])){if(k.includes("超级玛丽")||k.includes("大黄蜂"))scores["criticalIllness"][k].score+=5;}
    if(scores["medical"])for(const k of Object.keys(scores["medical"])){if(k.includes("蓝医保")||k.includes("尊享e生"))scores["medical"][k].score+=5;}
  }
  if(valuesS.has("advisor")){
    if(scores["savings"])for(const k of Object.keys(scores["savings"])){if(k.includes("友邦")||k.includes("中意")||k.includes("大都会"))scores["savings"][k].score+=4;}
    if(scores["medical"])for(const k of Object.keys(scores["medical"])){if(k.includes("高端")||k.includes("MSH")||k.includes("Bupa"))scores["medical"][k].score+=4;}
  }
  if(valuesS.has("digital")){
    if(scores["medical"])for(const k of Object.keys(scores["medical"])){if(k.includes("微医保")||k.includes("京东保")||k.includes("众安"))scores["medical"][k].score+=4;}
    if(scores["accident"])for(const k of Object.keys(scores["accident"])){if(k.includes("众安")||k.includes("小蜜蜂"))scores["accident"][k].score+=3;}
  }

  // === Branch-specific deep adjustments ===
  const exerciseHabits=gm(["a17"]);
  if(exerciseHabits==="extreme"){if(scores["accident"])for(const k of Object.keys(scores["accident"])){if(k.includes("运动")||k.includes("安联"))scores["accident"][k].score+=8;scores["accident"][k].reasons.unshift("极限运动爱好者，需含高风险运动保障");}}
  if(exerciseHabits==="outdoor"){if(scores["accident"])for(const k of Object.keys(scores["accident"])){scores["accident"][k].score+=2;}}
  if(exerciseHabits==="drive"){if(!scores["auto"])add("auto","平安车险",20,"经常开车出行，车险+驾乘险双重保障");}

  const insuranceKnowledge=gm(["a19"]);
  if(insuranceKnowledge==="beginner"){
    if(scores["medical"])for(const k of Object.keys(scores["medical"])){scores["medical"][k].reasons.unshift("您是保险新手，推荐条款清晰、健告友好的入门产品");}
  }

  const childEduStage=gm(["b7"]);
  if(childEduStage==="college"){if(scores["savings"])for(const k of Object.keys(scores["savings"])){if(k.includes("年金")||k.includes("教育"))scores["savings"][k].score+=5;}}
  const mortgageAmt=gm(["b8"]);
  if(mortgageAmt==="150-300w"||mortgageAmt==="gt300w"){
    if(scores["termLife"])for(const k of Object.keys(scores["termLife"])){if(k.includes("大麦"))scores["termLife"][k].score+=8;scores["termLife"][k].reasons.unshift("高房贷家庭(150万+)，需高额定寿覆盖负债缺口");}
  }

  const enterpriseRev=gm(["c1"]);
  if(enterpriseRev==="gt5000w"||enterpriseRev==="500-5000w"){
    if(scores["savings"])for(const k of Object.keys(scores["savings"])){if(k.includes("泰赢家")||k.includes("星福家"))scores["savings"][k].score+=6;}
  }

  const livingArrangement=gm(["d6"]);
  if(livingArrangement==="need-care"){
    if(!scores["savings"])scores["savings"]={};
    if(scores["savings"])for(const k of Object.keys(scores["savings"])){if(k.includes("光明")||k.includes("护理"))scores["savings"][k].score+=8;scores["savings"][k].reasons.unshift("需要日常护理支持，养老社区+护理保障产品优先");}
  }
  const nursingConcern=gm(["d12"]);
  if(nursingConcern==="very"){
    if(scores["savings"])for(const k of Object.keys(scores["savings"])){if(k.includes("光明一生")||k.includes("护理")||k.includes("岁享金生"))scores["savings"][k].score+=6;scores["savings"][k].reasons.unshift("非常担心护理费用，含护理/养老社区的产品优先推荐");}
  }
  // Pension community + senior annuity recommendations
  if(isSenior||priority==="retirement"||nursingConcern==="very"){
    if(!scores["savings"])scores["savings"]={};
    add("savings","颐养天年2026(养老年金)",18,"人保大品牌+养老金每年递增3%抗通胀+保证领取20年，退休规划首选");
    add("savings","颐年金2026(养老年金)",16,"平安品牌+保证领取25年+可附加护理险+养老社区对接");
    add("savings","金生有约2026(养老年金)",14,"保证领取20年+可选每年递增5%+健告宽松");
    if(highAssets){
      add("savings","悦享金生2026(养老年金)",20,"太平小镇养老社区保证入住+候鸟式养老(上海/三亚/成都)+含医疗绿通");
      add("savings","星盈家2026(分红型增额寿)",18,"复星保德信+星堡养老社区对接+连续13年分红≥100%+增值传承双优");
      add("savings","金麒麟2026(固收型增额寿)",14,"长城人寿国企背景+趸交第4年回本+含意外身故额外赔");
    }
    if(brandPref==="big-brand"||brandPref==="state-owned"){
      add("savings","金利优享2026(固收型年金)",16,"新华大品牌+保证领取20年+可附加万能账户+缴费灵活");
      add("savings","福临门2026(快返型年金)",12,"华夏人寿+第5年起返还+万能账户结算约3.2%+灵活支取");
    }
    if(brandPref==="joint-venture"){
      add("savings","鑫丰年2026(分红型年金)",14,"工商银行+安盛合资+满5年即返还+年金万能组合");
      add("savings","金裕安康2026(养老年金)",14,"招商信诺+保证领取25年+可附加重疾豁免+招商银行渠道");
    }
  }
  const inheritancePlan=gm(["d19"]);
  if(inheritancePlan==="formal-plan"){
    if(scores["savings"])for(const k of Object.keys(scores["savings"])){if(k.includes("星福家")||k.includes("盛世金越")||k.includes("一生中意"))scores["savings"][k].score+=6;scores["savings"][k].reasons.unshift("有正式传承规划需求，指定受益人+多代传承产品匹配");}
  }

  // === Combined factor boosts ===
  // High income + no existing insurance = urgent need, boost everything
  if(isHighIncome&&existingS.has("none")&&existingS.size===1){
    if(scores["medical"])for(const k of Object.keys(scores["medical"])){scores["medical"][k].score+=5;scores["medical"][k].reasons.unshift("高收入但无任何保障，配置优先级最高");}
    if(scores["criticalIllness"])for(const k of Object.keys(scores["criticalIllness"])){scores["criticalIllness"][k].score+=5;}
  }
  // Budget-conscious + young = push accident + medical before critical illness
  if((budget==="minimal"||budget==="low")&&isYoung){
    if(scores["accident"])for(const k of Object.keys(scores["accident"])){scores["accident"][k].score+=5;scores["accident"][k].reasons.unshift("预算有限但年轻人意外风险高，意外险百元级高杠杆优先配置");}
    if(scores["medical"])for(const k of Object.keys(scores["medical"])){if(k.includes("京东保")||k.includes("尊享e生"))scores["medical"][k].score+=3;}
  }
  // Smoker + term life = higher need
  if(healthS.has("smoking")&&scores["termLife"]){
    for(const k of Object.keys(scores["termLife"])){if(k.includes("定海柱"))scores["termLife"][k].score+=5;scores["termLife"][k].reasons.unshift("长期吸烟，健康告知宽松的定寿产品优先");}
  }

  // === Sort & select top 2 ===
  const result={};
  for(const [cat,prodScores] of Object.entries(scores)){
    if(cat==="savings"&&prodScores["__hk_note__"]){
      result["__hk__"]=prodScores["__hk_note__"];
      delete prodScores["__hk_note__"];
    }
    const sorted=Object.entries(prodScores).sort((a,b)=>b[1].score-a[1].score);
    if(sorted.length>0){
      const catProds=PRODUCTS[cat];
      if(!catProds)continue;
      result[cat]=sorted.slice(0,2).map(([name,data])=>{
        const prod=catProds.find(p=>p.name===name);
        return prod?{...prod,matchScore:Math.min(data.score,99),matchReasons:data.reasons}:null;
      }).filter(Boolean);
    }
  }
  return result;
}

function ProgressBar({current,total}){
  const pct=Math.round((current/total)*100);
  return(<div className="w-full px-6 pt-8 pb-2"><div className="flex items-center justify-between mb-2"><span className="text-sm font-medium text-gray-400">第 {current}/{total} 题</span><span className="text-sm font-medium text-gray-400">{pct}%</span></div><div className="progress-bar w-full"><div className="progress-bar-fill" style={{width:`${pct}%`}}></div></div></div>);
}

function QuestionCard({question,selected,onSelect,onNext,onPrev,isFirst,isLast,isMulti}){
  const [multiSelected,setMultiSelected]=useState(Array.isArray(selected)?selected:[]);
  const prevSelected=useRef(null);
  useEffect(()=>{
    if(Array.isArray(selected)&&JSON.stringify(selected)!==JSON.stringify(prevSelected.current)){setMultiSelected(selected);prevSelected.current=selected;}
  },[selected]);

  const goSingle=v=>{onSelect(v);onNext();};
  const goToggle=v=>{
    let upd;
    if(v==="none"&&!multiSelected.includes("none"))upd=["none"];
    else if(v==="none")upd=[];
    else upd=multiSelected.includes(v)?multiSelected.filter(x=>x!==v):[...multiSelected.filter(x=>x!=="none"),v];
    setMultiSelected(upd);onSelect(upd);
  };
  const goMultiNext=()=>{if(multiSelected.length>0)onNext();};

  return(<div className="slide-in flex flex-col items-center justify-center min-h-[70vh] px-4 max-w-2xl mx-auto">
    <div className="text-center mb-8"><h2 className="text-3xl font-bold text-gray-800 mb-3 leading-tight tracking-tight">{question.t}</h2><p className="text-base text-gray-400 font-normal">{question.s}</p></div>
    <div className="w-full space-y-3" style={{maxHeight:'55vh',overflowY:'auto',paddingRight:'4px'}}>
      {question.o.map(opt=>{
        const isSel=isMulti?multiSelected.includes(opt.v):selected===opt.v;
        return(<button key={opt.v} className={`btn-option ${isSel?'selected':''} flex items-center gap-4 text-left`} onClick={()=>isMulti?goToggle(opt.v):goSingle(opt.v)}>
          <span className="text-2xl flex-shrink-0">{opt.i}</span><span className={`font-medium flex-1 ${isSel?'text-blue-600':'text-gray-700'}`}>{opt.l}</span>
          {isSel&&!isMulti&&<span className="text-blue-500"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></span>}
          {isSel&&isMulti&&<span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full font-medium">已选</span>}
        </button>);
      })}
    </div>
    {isMulti&&<button className={`btn-primary mt-6 px-12 py-3 text-base`} disabled={multiSelected.length===0} onClick={goMultiNext}>继续 →</button>}
    <div className="flex justify-between w-full mt-6">{!isFirst&&<button onClick={onPrev} className="text-gray-400 hover:text-gray-600 font-medium text-sm transition-colors">← 上一题</button>}<div className="flex-1"></div>{!isFirst&&!isMulti&&<span className="text-xs text-gray-300">按 ← 返回修改</span>}</div>
  </div>);
}

      <div className="text-center px-4 border-l border-gray-200"><div className="text-2xl font-bold text-gray-800">{Object.values(PRODUCTS).flat().length}</div><div className="text-xs text-gray-400">在售产品</div></div>
      <div className="text-center px-4 border-l border-gray-200"><div className="text-2xl font-bold text-gray-800">7</div><div className="text-xs text-gray-400">保障维度</div></div>
      <div className="text-center px-4 border-l border-gray-200"><div className="text-2xl font-bold text-gray-800">4 分钟</div><div className="text-xs text-gray-400">快速评估</div></div>
    </div>
    <button className="btn-primary px-12 py-4 text-lg rounded-2xl shadow-lg" onClick={onStart}>开始测评 →</button>
    <p className="mt-10 text-xs text-gray-300">全程无需注册 · 数据不上传 · 约 4 分钟完成</p>
  </div>);
}

const BRANCHES={A:BRANCH_A,B:BRANCH_B,C:BRANCH_C,D:BRANCH_D};
const BRANCH_LABELS={A:"年轻奋斗族",B:"家庭守护者",C:"企业主/高净值",D:"银发安康"};

function App(){
  const [step,setStep]=useState("welcome");
  const [phase,setPhase]=useState("trunk"); // trunk | branch | branchIntro | result
  const [qIdx,setQIdx]=useState(0);
  const [branchKey,setBranchKey]=useState(null);
  const [recommendations,setRecommendations]=useState(null);
  const latestAnswers=useRef({});

  const currentQuestions=phase==="trunk"?TRUNK:(branchKey?BRANCHES[branchKey]:[]);
  const totalQuestions=currentQuestions.length;

  // === Universal cross-question filter ===
  function getFilteredQuestion(q,answers){
    const age=answers["t1"]; const role=answers["t3"]; const income=answers["t4"];
    const occupation=answers["t5"]; const existingS=new Set(Array.isArray(answers["a3"]||answers["b3"]||answers["c4"]||answers["d3"])?(answers["a3"]||answers["b3"]||answers["c4"]||answers["d3"]):[]);
    const depS=new Set(Array.isArray(answers["a6"]||answers["b6"]||answers["c6"])?(answers["a6"]||answers["b6"]||answers["c6"]):[]);
    const childStage=answers["b7"]; const mortgageAmt=answers["b8"];
    const enterpriseRev=answers["c1"]; const childrenSituation=answers["d7"];

    let opts=[...q.o]; let subtitle=q.s||""; let changed=false;
    const filterOut=(...vals)=>{const prev=opts.length;opts=opts.filter(o=>!vals.includes(o.v));if(opts.length<prev)changed=true;};
    const boost=(val,label)=>{const o=opts.find(x=>x.v===val);if(o&&!o.l.includes(label)){o.l=label;changed=true;}};
    const autoSelect=(val)=>{opts=[opts.find(o=>o.v===val)].filter(Boolean);changed=true;};

    // === Q-specific rules ===
    switch(q.id){
      case "t3": // Family role ← age
        if(age){
          if(["18-25","26-35"].includes(age)) filterOut("child","elder","parent-young","parent-school","parent-adult");
          else if(["36-45","46-55"].includes(age)) filterOut("child","elder");
          else if(["56-65","66+"].includes(age)) filterOut("child","parent-young","parent-school","single");
        }
        break;
      case "t4": // Income ← age + role
        if(age&&["18-25"].includes(age)){boost("lt5","（含学生/零收入）");}
        if(role==="elder"||age&&["66+"].includes(age)){filterOut("gt500");boost("lt5","（退休金收入）");boost("5-15","（退休金+储蓄）");}
        break;
      case "t5": // Occupation ← age + role
        if(age&&["56-65","66+"].includes(age)){filterOut("high-risk","freelancer");boost("retired","（推荐）");}
        if(role==="elder"||role==="child"){autoSelect(role==="elder"?"retired":"employee");}
        break;
      case "a1": case "b1": case "c1": case "d1": // Social ← occupation
        if(occupation==="civil"||occupation==="employee"){boost("employee-ins","（当前职业匹配）");}
        if(occupation==="freelancer"||occupation==="retired"){boost("resident-ins","（灵活就业/居民医保）");}
        break;
      case "a4": case "b4": case "c5": case "d4": // Priority ← existing insurance
        if(existingS.has("critical")) filterOut("disease");
        if(existingS.has("medical")) filterOut("hospital");
        if(existingS.has("accident")) filterOut("accident-risk");
        if(existingS.has("term-life")||existingS.has("whole-life")) filterOut("family-protect");
        if(existingS.has("annuity")||existingS.has("whole-life")){filterOut("retirement");filterOut("child-education");}
        break;
      case "a5": case "b5": // Budget ← income
        if(income==="lt5"||income==="5-15"){filterOut("unlimited","high");boost("minimal","（与收入匹配）");boost("low","（与收入匹配）");}
        if(income==="100-500"||income==="gt500"){filterOut("minimal");boost("high","（收入水平充裕）");}
        break;
      case "b6": // Burden ← child stage
        if(childStage==="not-yet"){filterOut("young-kids","school-kids");boost("no-dependent","（当前无子女）");}
        if(childStage==="college") filterOut("young-kids");
        if(mortgageAmt==="no-mortgage") filterOut("mortgage");
        break;
      case "b7": // Child education stage ← burden
        if(!depS.has("young-kids")&&!depS.has("school-kids")){opts=[{v:"not-yet",l:"还没有孩子",i:"⏳"}];changed=true;}
        break;
      case "b8": // Mortgage ← burden
        if(!depS.has("mortgage")){opts=[{v:"no-mortgage",l:"无房贷",i:"✅"},...opts.filter(o=>o.v==="no-mortgage"||o.v!=="no-mortgage").slice(0,4)];changed=true;}
        break;
      case "c1": // Enterprise revenue ← occupation
        if(occupation&&occupation!=="business-owner"){boost("na","（非企业主，高净值个人）");}
        break;
      case "c2": // Biz risk ← enterprise revenue
        if(enterpriseRev==="na"){autoSelect("not-applicable");}
        break;
      case "c11": // Budget ← income
        if(income==="100-500"||income==="gt500"){filterOut("mid");boost("uhnw","（与收入匹配）");boost("unlimited","（与收入匹配）");}
        break;
      case "d4": // Priority for seniors ← health + age
        if(age==="66+"){boost("nursing","（高龄必备）");boost("accident-risk","（跌倒风险增加）");}
        if(age==="56-65"){boost("retirement","（临近退休）");}
        break;
      case "d7": // Children situation ← age
        if(age==="56-65"){boost("adult-nearby","（子女大概率已成年）");boost("adult-far","（子女可能异地）");filterOut("supporting");}
        if(age==="66+"){filterOut("supporting");boost("adult-nearby","");boost("adult-far","");}
        break;
      case "d12": // Nursing concern ← age
        if(age==="66+"){boost("very","（高龄阶段重点关注）");boost("somewhat","");filterOut("not-concerned");}
        break;
      case "d19": // Inheritance ← children
        if(childrenSituation==="no-children"){filterOut("formal-plan");boost("simple-will","（无直系继承人）");boost("not-concerned","");}
        break;
    }

    if(changed&&!subtitle.includes("智能筛选")){subtitle=subtitle?subtitle+"（已根据前面回答智能筛选）":"（已根据前面回答智能筛选）";}
    return opts.length!==q.o.length||changed?{...q,o:opts,s:subtitle}:q;
  }

  const q=currentQuestions[qIdx];
  const displayQ=getFilteredQuestion(q,latestAnswers.current);

  const handleSelect=v=>{
    const id=currentQuestions[qIdx].id;
    latestAnswers.current={...latestAnswers.current,[id]:v};
  };
  const handleNext=()=>{
    if(phase==="branchIntro"){setPhase("branch");setQIdx(0);return;}
    if(qIdx<currentQuestions.length-1){setQIdx(p=>p+1)}
    else{
      if(phase==="trunk"){
        const bi=resolveBranch(latestAnswers.current);
        setBranchKey(bi.branch);
        setPhase("branchIntro");
      }else{
        try{setRecommendations(calculateRecommendations(latestAnswers.current));setStep("result");}
        catch(e){console.error("评分引擎错误:",e.message);setRecommendations({_error:true,_message:e.message,_stack:e.stack||''});setStep("result");}
      }
    }
  };
  const handlePrev=()=>{if(qIdx>0)setQIdx(p=>p-1)};
  const handleRestart=()=>{setStep("welcome");setPhase("trunk");setQIdx(0);setBranchKey(null);setRecommendations(null);latestAnswers.current={};};

  if(step==="welcome")return<WelcomeScreen onStart={()=>setStep("quiz")}/>;
  if(step==="result")return<ResultsPage recommendations={recommendations} onRestart={handleRestart}/>;

  if(phase==="branchIntro")return(
    <div className="fade-in flex flex-col items-center justify-center min-h-screen px-6 text-center">
      <div className="text-6xl mb-6">{branchKey==="A"?"🚀":branchKey==="B"?"🏠":branchKey==="C"?"🏰":"🌅"}</div>
      <h2 className="text-3xl font-bold text-gray-800 mb-3">已识别你的画像：<span className="text-blue-600">{BRANCH_LABELS[branchKey]}</span></h2>
      <p className="text-gray-400 mb-2 max-w-md">接下来是为你量身定制的专属问题</p>
      <p className="text-gray-300 text-sm mb-8">总题数 5+{BRANCHES[branchKey].length}=<b>{5+BRANCHES[branchKey].length} 题</b></p>
      <button className="btn-primary px-12 py-4 text-lg rounded-2xl" onClick={handleNext}>进入专属问答 →</button>
    </div>
  );

  const progressTotal = TRUNK.length + totalQuestions;
  const progressCurrent = phase==="trunk" ? qIdx+1 : TRUNK.length + qIdx + 1;
  return(<div className="min-h-screen bg-[#f5f5f7]">
    <ProgressBar current={progressCurrent} total={progressTotal}/>
    {phase==="branch"&&<div className="px-6 pt-2"><span className="text-xs text-blue-500 bg-blue-50 px-3 py-1 rounded-full font-medium">{BRANCH_LABELS[branchKey]} · 专属问题</span></div>}
    <div key={displayQ.id}><QuestionCard question={displayQ} selected={latestAnswers.current[displayQ.id]||(displayQ.ty==="multi"?[]:null)} onSelect={handleSelect} onNext={handleNext} onPrev={handlePrev} isFirst={phase==="trunk"?qIdx===0:false} isLast={phase==="branch"&&qIdx===totalQuestions-1} isMulti={displayQ.ty==="multi"}/></div>
    <div className="fixed bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-[#f5f5f7] to-transparent pointer-events-none"></div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
