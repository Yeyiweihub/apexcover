<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保险科普 — ApexCover</title>
<style>
:root {
  --bg: #000; --surface: rgba(255,255,255,.04); --border: rgba(255,255,255,.06);
  --text: #e8e8ed; --text-secondary: #98989e; --text-tertiary: #636369;
  --blue: #5e9eff; --accent: #5e9eff;
  --nav-bg: rgba(0,0,0,.7); --radius: 20px;
}
[data-theme="light"] {
  --bg: #fbfbfd; --surface: #fff; --border: #e5e5ea;
  --text: #1d1d1f; --text-secondary: #6e6e73; --text-tertiary: #aeaeb2;
  --blue: #0066cc; --accent: #0066cc; --nav-bg: rgba(251,251,253,.8);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
}
.container{max-width:1100px;margin:0 auto;padding:0 32px}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;
  display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(20px);background:var(--nav-bg);border-bottom:1px solid var(--border);
}
nav .logo{font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
nav .logo a{color:var(--text);text-decoration:none}
nav .logo span{color:var(--accent)}
nav .links{display:flex;gap:24px;align-items:center}
nav .links a{color:var(--text-secondary);text-decoration:none;font-size:14px;transition:color .2s}
nav .links a:hover{color:var(--text)}
nav .links .active{color:var(--accent)}
.theme-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#f5f5f7;
}
[data-theme="light"] .theme-btn{background:#1d1d1f}
.theme-btn:hover{opacity:.8}
[data-theme="light"] .sun{display:none}
html:not([data-theme="light"]) .moon{display:none}

.hero{padding:120px 0 60px;text-align:center}
.hero h1{font-size:clamp(36px,5vw,56px);font-weight:700;letter-spacing:-.02em;margin-bottom:12px}
.hero p{font-size:18px;color:var(--text-secondary)}

.tabs{display:flex;gap:4px;justify-content:center;margin-bottom:60px;flex-wrap:wrap}
.tab{
  padding:10px 20px;border-radius:100px;font-size:14px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:var(--surface);
  color:var(--text-secondary);transition:all .25s;
}
.tab:hover{color:var(--text);border-color:var(--border-hover, #d2d2d7)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.category{margin-bottom:60px}
.category h2{font-size:28px;font-weight:700;letter-spacing:-.015em;margin-bottom:8px}
.category p.desc{font-size:15px;color:var(--text-secondary);margin-bottom:28px}

.videos{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.video-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:all .3s;
}
.video-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.video-card .thumb{
  height:180px;background:linear-gradient(135deg,rgba(94,158,255,.15),rgba(94,158,255,.05));
  display:flex;align-items:center;justify-content:center;position:relative;
}
.video-card .thumb .play{
  width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
}
.video-card .thumb .play::after{
  content:'';width:0;height:0;border-left:14px solid #fff;
  border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:3px;
}
.video-card .thumb .duration{
  position:absolute;bottom:10px;right:12px;font-size:12px;color:#fff;
  background:rgba(0,0,0,.6);padding:3px 8px;border-radius:6px;
}
.video-card .info{padding:20px}
.video-card .info h3{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text)}
.video-card .info p{font-size:13px;color:var(--text-secondary);line-height:1.5}

.cta{
  text-align:center;padding:80px 0;
  border-top:1px solid var(--border);margin-top:40px;
}
.cta h2{font-size:28px;font-weight:700;margin-bottom:12px}
.cta p{color:var(--text-secondary);margin-bottom:24px}
.cta button{
  padding:14px 40px;font-size:16px;font-weight:600;background:var(--accent);color:#fff;
  border:none;border-radius:12px;cursor:pointer;
}
.cta button:hover{opacity:.85}

footer{text-align:center;padding:40px;color:var(--text-tertiary);font-size:13px;border-top:1px solid var(--border)}

@media(max-width:768px){
  .container{padding:0 20px}
  .videos{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <div class="logo"><a href="index.html">Apex<span>Cover</span></a></div>
  <div class="links">
    <a href="index.html">首页</a>
    <a href="learn.html" class="active">保险科普</a>
    <a href="advisor.html">智能规划</a>
  </div>
  <button class="theme-btn" id="themeToggle" aria-label="切换主题">
    <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</nav>

<section class="hero">
  <div class="container">
    <h1>保险科普</h1>
    <p>每种保险最常见的坑，3 分钟给你讲明白</p>
  </div>
</section>

<div class="container">
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="all">全部</div>
    <div class="tab" data-tab="medical">🏥 医疗险</div>
    <div class="tab" data-tab="critical">🛡️ 重疾险</div>
    <div class="tab" data-tab="accident">🤕 意外险</div>
    <div class="tab" data-tab="life">💙 寿险</div>
    <div class="tab" data-tab="savings">📈 储蓄险</div>
    <div class="tab" data-tab="auto">🚗 车险</div>
  </div>
</div>

<div class="container" id="content"></div>

<div class="container">
  <div class="cta">
    <h2>看完视频，测测你需要什么保险</h2>
    <p>25 道题，3 分钟，精准匹配最适合你的方案</p>
    <button onclick="location.href='advisor.html'">开始测评 →</button>
  </div>
</div>

<footer>ApexCover · 23 名平均从业超过十年的保险规划师给您的最好建议</footer>

<script>
// Theme sync
(function(){
  const saved = localStorage.getItem('apexcover-theme');
  if(saved==='light') document.documentElement.setAttribute('data-theme','light');
  window.addEventListener('storage', e => {
    if(e.key==='apexcover-theme') document.documentElement.setAttribute('data-theme', e.newValue==='light'?'light':'dark');
  });
  document.getElementById('themeToggle').addEventListener('click',()=>{
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('apexcover-theme', next);
  });
})();

const VIDEOS = [
  {cat:'medical',title:'保证续保的猫腻',desc:'百万医疗险最大的卖点是保证续保20年。但20年后呢？停售了怎么办？已经理赔过还能续吗？',duration:'3:20',thumb:'🏥'},
  {cat:'medical',title:'外购药：最容易被忽视的坑',desc:'DRG改革后，越来越多的药要自己去院外买。你的医疗险报销吗？报销多少？',duration:'3:50',thumb:'💊'},
  {cat:'medical',title:'免赔额陷阱',desc:'0免赔 vs 1万免赔，差了不止一万块。算一笔账你就明白了。',duration:'2:40',thumb:'🧮'},
  {cat:'critical',title:'病种凑数：100种重疾全是套路',desc:'重疾险保100种、120种……数字越大越好？监管规定的28种已经覆盖95%。',duration:'4:10',thumb:'🎰'},
  {cat:'critical',title:'返还型重疾险划算吗？',desc:'有病赔钱，没病返本。听着很完美，算完IRR你就笑不出来了。',duration:'3:30',thumb:'🔄'},
  {cat:'critical',title:'轻症理赔门槛有多高？',desc:'冠状动脉介入术——必须开胸才赔。微创不算。这些细节没人告诉你。',duration:'3:00',thumb:'🔍'},
  {cat:'accident',title:'猝死算不算意外？',desc:'法律定义里，猝死不算意外。你的意外险含猝死吗？',duration:'2:30',thumb:'💀'},
  {cat:'accident',title:'职业变更不告知的后果',desc:'换了工作，从坐办公室变成送外卖——意外险可能已经失效了。',duration:'2:50',thumb:'🔄'},
  {cat:'life',title:'定期寿险 vs 终身寿险',desc:'保费差10倍。对大多数人来说，定期寿险就够了。为什么？',duration:'3:10',thumb:'⚖️'},
  {cat:'life',title:'受益人选谁？90%的人搞错了',desc:'指定受益人和法定受益人的区别，可能让理赔金进错了口袋。',duration:'2:20',thumb:'👨‍👩‍👧'},
  {cat:'savings',title:'演示利率≠实际收益',desc:'计划书上漂亮的数字，哪部分是保证的？哪部分只是假设？',duration:'3:40',thumb:'📊'},
  {cat:'savings',title:'增额寿的减保陷阱',desc:'宣传说灵活支取，但每年最多取20%，急用钱时根本不够。',duration:'3:00',thumb:'🔒'},
  {cat:'auto',title:'三者险300万够不够？',desc:'撞了豪车、撞了人——300万真的够赔吗？一线城市建议500万起。',duration:'2:50',thumb:'🚗'},
  {cat:'auto',title:'新车险改革后，这些不用买了',desc:'车损险已经包含盗抢、自燃、涉水。别再花冤枉钱重复投保。',duration:'2:30',thumb:'💰'},
];

function renderVideos(filter){
  const content = document.getElementById('content');
  const cats = ['medical','critical','accident','life','savings','auto'];
  const catNames = {medical:'🏥 医疗险的坑',critical:'🛡️ 重疾险的坑',accident:'🤕 意外险的坑',life:'💙 寿险的坑',savings:'📈 储蓄险的坑',auto:'🚗 车险的坑'};
  const catDescs = {medical:'住院报销的水比你想的深——保证续保、外购药、免赔额',critical:'确诊即赔钱？先看清楚条款写的是什么病',accident:'不是所有"意外"都算意外——职业、猝死、免责条款',life:'最便宜也最容易被忽略的险种——家庭支柱的最后一个防线',savings:'储蓄和保障混在一起的时候，最容易出问题',auto:'车险年年交，交了十几年你可能还是买错了'};

  let videos = VIDEOS;
  if(filter && filter !== 'all') videos = VIDEOS.filter(v => v.cat === filter);

  let html = '';
  if(filter && filter !== 'all'){
    html += `<div class="category"><h2>${catNames[filter]}</h2><p class="desc">${catDescs[filter]}</p><div class="videos">`;
    videos.forEach(v => {
      html += `<div class="video-card"><div class="thumb"><span style="font-size:48px">${v.thumb}</span><span class="duration">${v.duration}</span></div><div class="info"><h3>${v.title}</h3><p>${v.desc}</p></div></div>`;
    });
    html += '</div></div>';
  } else {
    cats.forEach(cat => {
      const catVids = VIDEOS.filter(v => v.cat === cat);
      if(!catVids.length) return;
      html += `<div class="category"><h2>${catNames[cat]}</h2><p class="desc">${catDescs[cat]}</p><div class="videos">`;
      catVids.forEach(v => {
        html += `<div class="video-card"><div class="thumb"><span style="font-size:48px">${v.thumb}</span><span class="duration">${v.duration}</span></div><div class="info"><h3>${v.title}</h3><p>${v.desc}</p></div></div>`;
      });
      html += '</div></div>';
    });
  }
  content.innerHTML = html;
}

document.getElementById('tabs').addEventListener('click', e => {
  if(!e.target.classList.contains('tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  renderVideos(e.target.dataset.tab);
});

renderVideos('all');
</script>
</body>
</html>
