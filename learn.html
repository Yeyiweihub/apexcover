<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保险科普 — ApexCover</title>
<style>
:root {
  --bg:#000;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.06);
  --text:#e8e8ed;--text-secondary:#98989e;--text-tertiary:#636369;
  --blue:#5e9eff;--accent:#5e9eff;--nav-bg:rgba(0,0,0,.7);
}
[data-theme="light"] {
  --bg:#fbfbfd;--surface:#fff;--border:#e5e5ea;
  --text:#1d1d1f;--text-secondary:#6e6e73;--text-tertiary:#aeaeb2;
  --blue:#0066cc;--accent:#0066cc;--nav-bg:rgba(251,251,253,.8);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.container{max-width:1100px;margin:0 auto;padding:0 32px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);background:var(--nav-bg);border-bottom:1px solid var(--border)}
nav .logo{font-size:18px;font-weight:600;letter-spacing:-.01em;color:var(--text)}
nav .logo a{color:var(--text);text-decoration:none}
nav .logo span{color:var(--accent)}
nav .links{display:flex;gap:24px;align-items:center}
nav .links a{color:var(--text-secondary);text-decoration:none;font-size:14px;transition:color .2s}
nav .links a:hover{color:var(--text)}
nav .links .active{color:var(--accent)}
.theme-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#f5f5f7}
[data-theme="light"] .theme-btn{background:#1d1d1f}
.theme-btn:hover{opacity:.8}
[data-theme="light"] .sun{display:none}
html:not([data-theme="light"]) .moon{display:none}

.hero{padding:120px 0 60px}
.hero h1{font-size:clamp(40px,6vw,64px);font-weight:700;letter-spacing:-.02em;margin-bottom:16px;max-width:600px}
.hero p{font-size:19px;color:var(--text-secondary);line-height:1.6;max-width:500px}

.video-hero{margin-bottom:80px}
.video-hero .player{border-radius:20px;overflow:hidden;background:var(--surface);border:1px solid var(--border)}
.video-hero iframe{width:100%;height:540px;border:none;display:block}
.video-hero .meta{margin-top:20px;display:flex;align-items:flex-start;justify-content:space-between;gap:40px}
.video-hero .meta h3{font-size:24px;font-weight:600;margin-bottom:8px}
.video-hero .meta p{font-size:15px;color:var(--text-secondary);line-height:1.6}
.video-hero .meta .dur{font-size:13px;color:var(--text-tertiary);white-space:nowrap;padding:4px 12px;border:1px solid var(--border);border-radius:20px}

.featured-video{
  margin-bottom:80px;background:linear-gradient(135deg,rgba(255,107,107,.1),rgba(255,159,67,.05));
  border:1px solid rgba(255,107,107,.15);border-radius:20px;padding:40px;
}
.fv-badge{display:inline-block;font-size:13px;font-weight:600;color:#ff6b6b;margin-bottom:20px;
  letter-spacing:.04em;text-transform:uppercase}
.fv-content{display:flex;gap:48px;align-items:center}
.fv-text{flex:1}
.fv-text h2{font-size:28px;font-weight:700;margin-bottom:12px;line-height:1.3}
.fv-text p{font-size:16px;color:var(--text-secondary);line-height:1.6;margin-bottom:20px}
.fv-cta{font-size:14px;color:#ff6b6b;font-weight:500;cursor:pointer}
.fv-placeholder{flex-shrink:0;width:180px;height:120px;background:rgba(255,107,107,.1);
  border:1px solid rgba(255,107,107,.2);border-radius:14px;
  display:flex;align-items:center;justify-content:center}
.fv-play{width:48px;height:48px;border-radius:50%;background:rgba(255,107,107,.2);
  display:flex;align-items:center;justify-content:center;font-size:18px;color:#ff6b6b}
@media(max-width:768px){.fv-content{flex-direction:column}.fv-placeholder{width:100%}}

.section{margin-bottom:100px}
.section h2{font-size:28px;font-weight:700;margin-bottom:8px}
.section .lead{font-size:15px;color:var(--text-secondary);margin-bottom:36px}

.articles{display:flex;flex-direction:column;gap:1px;background:var(--border);border-radius:16px;overflow:hidden}
.article{display:flex;align-items:center;gap:28px;padding:28px 32px;background:var(--surface);transition:all .25s;cursor:pointer}
.article:hover{background:var(--surface-hover,#f5f5f7)}
.article .num{font-size:24px;font-weight:700;color:var(--text-tertiary);width:36px;text-align:center;flex-shrink:0}
.article .info{flex:1}
.article .info h4{font-size:17px;font-weight:600;margin-bottom:4px}
.article .info .cat{font-size:13px;color:var(--accent)}
.article .info p{font-size:14px;color:var(--text-secondary);margin-top:6px;line-height:1.5}
.article .arrow{color:var(--text-tertiary);font-size:20px;opacity:0;transition:all .25s}
.article:hover .arrow{opacity:1;transform:translateX(4px)}

.tabs{display:flex;gap:6px;margin-bottom:32px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.cta{text-align:center;padding:80px 0 40px}
.cta p{color:var(--text-secondary);margin-bottom:20px}
.cta a{color:var(--accent);text-decoration:none;font-weight:500;font-size:15px}
footer{text-align:center;padding:40px;color:var(--text-tertiary);font-size:13px;border-top:1px solid var(--border)}

@media(max-width:768px){
  .container{padding:0 20px}
  .video-hero .meta{flex-direction:column;gap:12px}
  .video-hero iframe{height:300px}
}
</style>
</head>
<body>

<nav>
  <div class="logo"><a href="index.html">Apex<span>Cover</span></a></div>
  <div class="links">
    <a href="index.html">首页</a>
    <a href="learn.html" class="active">保险科普</a>
    <a href="advisor.html">智能规划</a>
    <a href="products.html">产品目录</a>
  </div>
  <button class="theme-btn" id="themeToggle" aria-label="切换主题">
    <svg class="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</nav>

<section class="hero"><div class="container">
  <h1>保险科普</h1>
  <p>每种保险，用最简单的方式讲清楚。不卖焦虑，只讲事实。</p>
</div></section>

<div class="container">
  <div class="video-hero">
    <div class="player">
      <video src="video1.mp4?v=2" id="mainPlayer" controls playsinline style="width:100%;height:540px;border-radius:20px;background:#000;outline:none"></video>
    </div>
    <div class="meta">
      <div>
        <h3>保险到底是什么？3 分钟搞懂</h3>
        <p>风险共担是保险的本质。理解这一点，你就比 90% 的消费者更懂保险。</p>
      </div>
      <div class="dur">2 分 17 秒</div>
    </div>
  </div>

  <div class="featured-video">
    <div class="fv-badge">🔥 深度揭露</div>
    <div class="fv-content">
      <div class="fv-text">
        <h2>你所知道的保险知识，90% 是错的</h2>
        <p>返本型、万能险、电话推销……这个行业靠信息不对称赚了太多钱。这一期，我们撕开它。</p>
        <span class="fv-cta">观看完整视频 →</span>
      </div>
      <video src="video2.mp4" controls playsinline
        style="width:280px;height:180px;border-radius:12px;flex-shrink:0;background:#000;outline:none"></video>
    </div>
  </div>

  <div class="section">
    <div class="tabs" id="tabs">
      <div class="tab active" data-cat="all">全部</div>
      <div class="tab" data-cat="medical">医疗险</div>
      <div class="tab" data-cat="critical">重疾险</div>
      <div class="tab" data-cat="accident">意外险</div>
      <div class="tab" data-cat="life">寿险</div>
      <div class="tab" data-cat="savings">储蓄险</div>
      <div class="tab" data-cat="auto">车险</div>
    </div>
    <div id="articles"></div>
  </div>

  <div class="cta">
    <p>看完视频，测测你需要什么保险</p>
    <a href="advisor.html">开始测评 →</a>
  </div>
</div>

<footer>ApexCover · 让保险回归透明</footer>

<script>
(function(){
  const s=localStorage.getItem('apexcover-theme');
  if(s==='light')document.documentElement.setAttribute('data-theme','light');
  document.getElementById('themeToggle').addEventListener('click',()=>{
    const c=document.documentElement.getAttribute('data-theme');
    const n=c==='light'?'dark':'light';
    document.documentElement.setAttribute('data-theme',n);
    localStorage.setItem('apexcover-theme',n);
  });
})();

const BILIBILI = "https://www.bilibili.com/video/BV1MwNA6TEKb/";

const VIDEOS = [
  {cat:'medical',title:'保证续保的猫腻',desc:'百万医疗险最大的卖点是保证续保20年。但20年后呢？停售了怎么办？理赔后续保吗？',vid:'video3.mp4'},
  {cat:'medical',title:'外购药：最容易被忽视的坑',desc:'DRG改革后，医院开的药要去院外买。你的医疗险报销吗？报销多少？',vid:'video4.mp4'},
  {cat:'medical',title:'免赔额陷阱',desc:'0免赔 vs 1万免赔，差了不止一万块。算一笔账你就明白了。',vid:'video5.mp4'},
  {cat:'critical',title:'病种凑数：100种重疾全是套路',desc:'重疾险保100种、120种……数字越大越好？监管规定的28种已经覆盖95%。'},
  {cat:'critical',title:'返还型重疾险划算吗？',desc:'有病赔钱，没病返本。听着很完美，算完IRR你就笑不出来了。'},
  {cat:'critical',title:'轻症理赔门槛有多高？',desc:'冠状动脉介入术——必须开胸才赔。微创不算。这些细节没人告诉你。'},
  {cat:'accident',title:'猝死算不算意外？',desc:'法律定义里，猝死不算意外。你的意外险含猝死吗？'},
  {cat:'accident',title:'职业变更不告知的后果',desc:'换了工作，从坐办公室变成送外卖——意外险可能已经失效了。'},
  {cat:'life',title:'定期寿险 vs 终身寿险',desc:'保费差10倍。对大多数人来说，定期寿险就够了。为什么？'},
  {cat:'life',title:'受益人选谁？90%的人搞错了',desc:'指定受益人和法定受益人的区别，可能让理赔金进错了口袋。'},
  {cat:'savings',title:'演示利率≠实际收益',desc:'计划书上漂亮的数字，哪部分是保证的？哪部分只是假设？'},
  {cat:'savings',title:'增额寿的减保陷阱',desc:'宣传说灵活支取，但每年最多取20%，急用钱时根本不够。'},
  {cat:'auto',title:'三者险300万够不够？',desc:'撞了豪车、撞了人——300万真的够赔吗？一线城市建议500万起。'},
  {cat:'auto',title:'新车险改革后，这些不用买了',desc:'车损险已经包含盗抢、自燃、涉水。别再花冤枉钱重复投保。'},
];

const catNames={medical:'医疗险',critical:'重疾险',accident:'意外险',life:'寿险',savings:'储蓄险',auto:'车险'};

function render(filter){
  let vids = VIDEOS;
  if(filter && filter!=='all') vids = VIDEOS.filter(v=>v.cat===filter);

  const container = document.getElementById('articles');
  let html = '<div class="articles">';
  vids.forEach((v,i) => {
    const playBtn = v.vid ? `<span style="color:var(--accent);font-size:13px;cursor:pointer;white-space:nowrap" onclick="event.stopPropagation();document.getElementById('mainPlayer').src='${v.vid}';document.getElementById('mainPlayer').scrollIntoView({behavior:'smooth'});document.getElementById('mainPlayer').play()">▶ 观看</span>` : '';
    html += `<div class="article"${v.vid?` onclick="document.getElementById('mainPlayer').src='${v.vid}';document.getElementById('mainPlayer').scrollIntoView({behavior:'smooth'});document.getElementById('mainPlayer').play()" style="cursor:pointer"`:''}>
      <div class="num">${String(i+1).padStart(2,'0')}</div>
      <div class="info">
        <div class="cat">${catNames[v.cat]}${playBtn?`<span style="margin-left:8px">${playBtn}</span>`:''}</div>
        <h4>${v.title}</h4>
        <p>${v.desc}</p>
      </div>
      ${v.vid?'<div class="arrow" style="opacity:.5">▶</div>':''}
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

document.getElementById('tabs').addEventListener('click', e => {
  if(!e.target.classList.contains('tab'))return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  render(e.target.dataset.cat);
});

render('all');

// Set default volume to 30%
document.querySelectorAll('video').forEach(v => v.volume = 0.3);
</script>
</body>
</html>
